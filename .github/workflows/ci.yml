name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'
      - run: dotnet build src/ -c Release
      - run: dotnet pack src/ -c Release -o ./nupkg
      - uses: actions/upload-artifact@v4
        with:
          name: nupkg
          path: ./nupkg/*.nupkg

  publish-binaries:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - rid: linux-x64
            artifact: xslt-mcp-linux-x64
          - rid: linux-arm64
            artifact: xslt-mcp-linux-arm64
          - rid: osx-x64
            artifact: xslt-mcp-osx-x64
          - rid: osx-arm64
            artifact: xslt-mcp-osx-arm64
          - rid: win-x64
            artifact: xslt-mcp-win-x64.exe
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'
      - name: Publish self-contained
        run: |
          dotnet publish src/ -c Release -r ${{ matrix.rid }} \
            --self-contained true \
            -p:PublishSingleFile=true \
            -p:IncludeNativeLibrariesForSelfExtract=true \
            -o ./publish
      - name: Rename artifact
        run: |
          if [[ "${{ matrix.rid }}" == win-* ]]; then
            mv ./publish/xslt-mcp-server.exe ./publish/${{ matrix.artifact }}
          else
            mv ./publish/xslt-mcp-server ./publish/${{ matrix.artifact }}
          fi
      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: ./publish/${{ matrix.artifact }}
