name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_NOLOGO: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Determine version from git tags
        id: version
        run: |
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          BASE_VERSION="${LATEST_TAG#v}"
          COMMITS_SINCE=$(git rev-list --count "${LATEST_TAG}..HEAD" 2>/dev/null || git rev-list --count HEAD)
          if [ "$COMMITS_SINCE" = "0" ]; then
            VERSION="$BASE_VERSION"
          else
            VERSION="${BASE_VERSION}.${COMMITS_SINCE}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Version: ${VERSION} (tag: ${LATEST_TAG}, +${COMMITS_SINCE} commits)"

      - name: Build
        env:
          BUILD_VERSION: ${{ steps.version.outputs.version }}
        run: dotnet build src/ -c Release -p:Version="$BUILD_VERSION"

      - name: Pack
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
        env:
          PKG_VERSION: ${{ steps.version.outputs.version }}
        run: dotnet pack src/ -c Release --no-build -p:PackageVersion="$PKG_VERSION" -o ./artifacts

      - name: Upload NuGet artifact
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages
          path: ./artifacts/*.nupkg

  publish-nuget:
    needs: build
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: nuget-packages
          path: ./artifacts

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Login to NuGet via trusted publisher
        id: nuget-login
        uses: NuGet/login@v1
        with:
          user: endpointsystems

      - name: Push to NuGet
        env:
          NUGET_KEY: ${{ steps.nuget-login.outputs.NUGET_API_KEY }}
        run: |
          for pkg in ./artifacts/*.nupkg; do
            dotnet nuget push "$pkg" \
              --api-key "$NUGET_KEY" \
              --source https://api.nuget.org/v3/index.json \
              --skip-duplicate
          done

  publish-binaries:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - rid: linux-x64
            artifact: xslt-mcp-linux-x64
          - rid: linux-arm64
            artifact: xslt-mcp-linux-arm64
          - rid: osx-x64
            artifact: xslt-mcp-osx-x64
          - rid: osx-arm64
            artifact: xslt-mcp-osx-arm64
          - rid: win-x64
            artifact: xslt-mcp-win-x64.exe
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Determine version
        id: version
        run: |
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          VERSION="${LATEST_TAG#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Publish self-contained
        env:
          BUILD_VERSION: ${{ steps.version.outputs.version }}
        run: |
          dotnet publish src/ -c Release -r ${{ matrix.rid }} \
            --self-contained true \
            -p:PublishSingleFile=true \
            -p:IncludeNativeLibrariesForSelfExtract=true \
            -p:Version="$BUILD_VERSION" \
            -o ./publish

      - name: Rename artifact
        run: |
          if [[ "${{ matrix.rid }}" == win-* ]]; then
            mv ./publish/xslt-mcp-server.exe ./publish/${{ matrix.artifact }}
          else
            mv ./publish/xslt-mcp-server ./publish/${{ matrix.artifact }}
          fi

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: ./publish/${{ matrix.artifact }}
